<!DOCTYPE html>
<html>
<head>
    <title>DocEvidence</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        input, textarea {
            width: 100%;
            margin: 10px 0;
            padding: 10px;
        }

        button {
            padding: 10px;
            width: 100%;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
        }

        pre {
            background: #eee;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>📘 DocEvidence Teacher Dashboard</h2>

    <input id="text" placeholder="Paste student essay here">

    <button onclick="analyze()">ANALYZE DOCUMENT</button>

    <h3>Result:</h3>
    <pre id="result"></pre>

</div>

<script>
async function analyze() {
    const text = document.getElementById("text").value;

    const response = await fetch("http://127.0.0.1:8000/analyze", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ text: text })
    });

    const data = await response.json();

    document.getElementById("result").innerText =
        JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
